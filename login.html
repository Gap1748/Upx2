<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Site DESU</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    form {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 10px;
    }
    input {
      display: block;
      margin: 15px auto;
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #b3062a;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Login</h1>
  <!-- O action define para onde o formulário vai enviar -->
  <form action="http://localhost:3000/login" method="post">
  <input type="text" name="ra" placeholder="Usuário (RA)" required>
  <input type="password" name="senha" placeholder="Senha" required>
  <button type="submit">Entrar</button>
</form>


  <!-- Futuramente:
       - Aqui você vai usar JavaScript para validar login
       - Se estiver correto, redireciona para home.html
       - Se estiver errado, mostra mensagem de erro -->
</body>
</html>
