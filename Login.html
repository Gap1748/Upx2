<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Site DESU</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Merriweather:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="LoginLook.css">
</head>
<body>
  <h1>
    <span>Login</span>
  </h1>

  <form action="SUA_URL_DE_AUTENTICACAO_AQUI" method="POST">
    <div class="login-container">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="senha" placeholder="Senha" class="CunnyS" required>
    </div>

    <main>
      <!--<button type="submit" class="ckr-mandar">Entrar</button>-->
      <button type="button" class="ckr-mandar" id="btnEntrar">Entrar</button>
      <button type="button" class="ckr-voltar" onclick="location.href='Basicus.html'">Voltar</button>
    </main>
  </form>

    <script>
      async function login() {
        //TEMPORÁRIOOOOOOOOOOOOOOOOOOOOOO
        
        const email = document.querySelector("[name='email']").value; 
        const senha = document.querySelector("[name='senha']").value;

      try {
        const response = await fetch("http://localhost:8080/usuarios/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email, 
                senha: senha
            })
        });

        if (!response.ok) {
            alert("Login inválido");
            return;
        }

        const usuario = await response.json();

        // AGORA DEVE FUNCIONAR
        // Salva o objeto inteiro — resolve o problema sem precisar de novo endpoint
        localStorage.setItem("usuarioLogado", JSON.stringify(usuario));// usando o localstorage para guardar qual foi o id do usuario que fez 
                                                                       // o login para conseguir atribuir o cadastro de motorista ao usuario certo. FINALMENTE

        alert("Login realizado!");

        window.location.href = "StartZ.html";

      } catch (error) {
        console.error(error);
        alert("Erro ao conectar com o servidor...");

    }
}

//backgroudn kajajaro
    function RandomBackgroundDesu() {
    const Rando = Math.random(); 
    let ImagicusChoosen = "";

    if (Rando < 0.40) {
        ImagicusChoosen = 'DaBackground.webp';
    } else if (Rando < 0.80) {
        ImagicusChoosen = 'DaBackGround.webp';
    } else if (Rando < 0.99) {
        ImagicusChoosen = 'daBackGround.webp';
    } else {
        ImagicusChoosen = 'DaBackDaGround.webp';
    }
    const AllTheWay = `Keks_Und_Lols/${ImagicusChoosen}`;    

    document.body.style.backgroundImage = `url('${AllTheWay}')`;
    }
    document.getElementById("btnEntrar").addEventListener("click", login);
    window.onload = RandomBackgroundDesu;
</script>

</body>
</html>
