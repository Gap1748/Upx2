<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro - Site DESU</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="MarkerLooks.css">
</head>
<body>

  <h1><span>Registro</span></h1>

  <form action="https://69c07233085e1a9fae3e5c0c.mockapi.io/inscricoes" method="post">
    
    <input type="text" name="ra" placeholder="RA (usuário)" required>
    <input type="text" name="cpf" id="cpf" placeholder="CPF" maxlength="14" required>
    <input type="text" name="endereco" placeholder="Endereço" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="telefone" id="telefone" placeholder="Número de telefone" maxlength="15" required>
    <input type="password" name="senha" placeholder="Senha" required>
    <input type="text" name="nome" placeholder="Nome completo" required>
    
    <div class="button-container">
      <button type="submit" class="ckr-mandar">Registrar</button>
      <button type="button" class="ckr-voltam" onclick="location.href='Basicus.html'">Voltar</button>
    </div>

  </form>

  <script>
    document.getElementById('cpf').addEventListener('input', function (e) {
      let value = e.target.value.replace(/\D/g, '');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      e.target.value = value;
    });

    document.getElementById('telefone').addEventListener('input', function (e) {
      let value = e.target.value.replace(/\D/g, '');
      value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
      value = value.replace(/(\d{5})(\d)/, '$1-$2');
      e.target.value = value;
    });
  </script>

</body>
</html>
