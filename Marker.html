<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro - Site DESU</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="MarkerLooks.css">
</head>
<body>
  <!-- Como o belo programmer front end que sou, não tenho orgulho em dizer que pouco entendo sobre oque acontece aqui (╥‸╥) -->
  <h1><span>Registro</span></h1>

  <!-- Sem action e sem method — o JS vai assumir o controle , alem disso deixando tudo com um id para ficar mais facil depois-->
  <form id="formRegistro">
    
    <!-- MODO ANTIGO (placeholder dentro do campo):
    <input type="text" name="ra"       id="ra"       placeholder="RA (usuário)"        required>
    <input type="text" name="cpf"      id="cpf"      placeholder="CPF" maxlength="14"  required>
    <input type="text" name="endereco" id="endereco" placeholder="Endereço"            required>
    <input type="email" name="email"   id="email"    placeholder="Email"               required>
    <input type="tel"  name="telefone" id="telefone" placeholder="Número de telefone" maxlength="15" required>
    <input type="password" name="senha" id="senha"   placeholder="Senha"              required>
    <input type="text" name="nome"     id="nome"     placeholder="Nome completo"       required>
    -->
    <div class="field-group">
      <input type="text" name="ra" id="ra" required>
      <label for="ra">RA (usuário)</label>
    </div>
    <div class="field-group">
      <input type="text" name="cpf" id="cpf" maxlength="14" required>
      <label for="cpf">CPF</label>
    </div>
    <div class="field-group">
      <input type="text" name="endereco" id="endereco" required>
      <label for="endereco">Endereço</label>
    </div>
    <div class="field-group">
      <input type="email" name="email" id="email" required>
      <label for="email">Email</label>
    </div>
    <div class="field-group">
      <input type="tel" name="telefone" id="telefone" maxlength="15" required>
      <label for="telefone">Número de telefone</label>
    </div>
    <div class="field-group">
      <input type="password" name="senha" id="senha" required>
      <label for="senha">Senha</label>
    </div>
    <div class="field-group">
      <input type="text" name="nome" id="nome" required>
      <label for="nome">Nome completo</label>
    </div>
    
    <div class="button-container">
      <button type="submit" class="ckr-mandar">Registrar</button>
      <button type="button" class="ckr-voltam" onclick="location.href='Basicus.html'">Voltar</button>
    </div>

  </form>

  <script>
    // mascaras
    document.getElementById('cpf').addEventListener('input', function (e) {
      let value = e.target.value.replace(/\D/g, '');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      e.target.value = value;
    });

    document.getElementById('telefone').addEventListener('input', function (e) {
      let value = e.target.value.replace(/\D/g, '');
      value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
      value = value.replace(/(\d{5})(\d)/, '$1-$2');
      e.target.value = value;
    });

    // envio do formulario
    document.getElementById('formRegistro').addEventListener('submit', async function (e) {
      e.preventDefault(); //impede o comportamento padrão do navegador

      const dados = {
        ra:       document.getElementById('ra').value,
        cpf:      document.getElementById('cpf').value,
        endereco: document.getElementById('endereco').value,
        email:    document.getElementById('email').value,
        telefone: document.getElementById('telefone').value,
        senha:    document.getElementById('senha').value,
        nomeCompleto:     document.getElementById('nome').value
      };

      try {
        const response = await fetch('http://localhost:8080/usuarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)  // envia como JSON para o Spring Boot
        });

        if (response.ok) {
          alert('Usuário cadastrado com sucesso!');
          location.href = 'Basicus.html'; // redireciona após cadastro
        } else {
          const erro = await response.text();
          alert('Erro ao cadastrar: ' + erro);
        }
      } catch (error) {
        alert('Não foi possível conectar ao servidor. Verifique se o Spring Boot está rodando.');
        console.error(error);
      }
    });

    //backgroudn kajajaro
    function RandomBackgroundDesu() {
    const Rando = Math.random(); 
    let ImagicusChoosen = "";

    if (Rando < 0.40) {
        ImagicusChoosen = 'DaBackground.webp';
    } else if (Rando < 0.80) {
        ImagicusChoosen = 'DaBackGround.webp';
    } else if (Rando < 0.99) {
        ImagicusChoosen = 'daBackGround.webp';
    } else {
        ImagicusChoosen = 'DaBackDaGround.webp';
    }
    const AllTheWay = `Keks_Und_Lols/${ImagicusChoosen}`;    

    document.body.style.backgroundImage = `url('${AllTheWay}')`;
  }

  window.onload = RandomBackgroundDesu;
  </script>

</body>
</html>
