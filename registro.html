<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registro - Site DESU</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    form {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input {
      display: block;
      margin: 15px auto;
      padding: 10px;
      width: 90%;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #b3062a;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Registro</h1>
  <!-- O action define para onde o formulário vai enviar -->
  <form action="http://localhost:3000/registro" method="post">
  <input type="text" name="ra" placeholder="RA (usuário)" required>
  <input type="text" name="cpf" placeholder="CPF" required>
  <input type="text" name="endereco" placeholder="Endereço" required>
  <input type="email" name="email" placeholder="Email" required>
  <input type="tel" name="telefone" placeholder="Número de telefone" required>
  <input type="password" name="senha" placeholder="Senha" required>
  <input type="text" name="nome" placeholder="Nome completo" required>
  <button type="submit">Registrar</button>
</form>

  

  <!-- Futuramente:
       - Aqui você vai usar JavaScript para validar todos os campos
       - Mostrar aviso se faltar algo
       - Redirecionar para home.html se estiver tudo certo -->
</body>
</html>
