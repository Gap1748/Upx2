<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="motor1Look.css">
    <title>Teste se vai ou se não vai</title>
</head>
<body>
    <h1><span>Prova do motor</span></h1>

  <form id="formRegistra">
    
    <!-- MODO ANTIGO (placeholder dentro do campo):
    <input type="text" name="cnh"      id="cnh"      placeholder="CNH" maxlength="11"  required>
    <input type="date"  name="validade" id="validade" placeholder="Data de validade" required>
    -->
    <div class="field-group">
      <input type="text" name="cnh" id="cnh" maxlength="11" required>
      <label for="cnh">CNH</label>
    </div>
    <div class="field-group">
      <input type="date" name="validade" id="validade" required>
      <label for="validade">Data de validade</label>
    </div>

    <div class="button-container">
      <button type="submit" class="ckr-marar">Proximo</button>
      <button type="button" class="ckr-voltam" onclick="location.href='Login.html'">Voltar</button>
    </div>

    
  </form>

  <script>
    // Recupera o usuário logado do localStorage
const _dadosSalvos = localStorage.getItem("usuarioLogado");
if (_dadosSalvos) {
  window.usuarioLogado = JSON.parse(_dadosSalvos);
} else {
  // Se não tiver ninguém logado, manda de volta pro login
  // Comente essa linha se quiser testar sem login por enquanto
 // window.location.href = "login.html"; // troca pelo nome da sua página de login
}
document.getElementById("formRegistra").addEventListener("submit", function(e) {
    e.preventDefault();

    const dadosMotorista = {
        cnh: document.getElementById("cnh").value,
        validade: document.getElementById("validade").value
    };

    localStorage.setItem("motorista", JSON.stringify(dadosMotorista));

    window.location.href = "motor2.html";
});
  function RandomBackgroundDesu() {
    const Rando = Math.random(); 
    let ImagicusChoosen = "";

    if (Rando < 0.40) {
        ImagicusChoosen = 'DaBackground.webp';
    } else if (Rando < 0.80) {
        ImagicusChoosen = 'DaBackGround.webp';
    } else if (Rando < 0.99) {
        ImagicusChoosen = 'daBackGround.webp';
    } else {
        ImagicusChoosen = 'DaBackDaGround.webp';
    }
    const AllTheWay = `Keks_Und_Lols/${ImagicusChoosen}`;    

    document.body.style.backgroundImage = `url('${AllTheWay}')`;
  }
  window.onload = RandomBackgroundDesu;
</script>

</body>
</html>
